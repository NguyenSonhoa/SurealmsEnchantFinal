# Grindstone settings
grindstone:
  # XP multiplier when disenchanting books
  xp-multiplier: 0.5

  # Allow disenchanting specialized books
  allow-specialized-disenchant: true

# Rune system settings
runes:
  # Enable rune system
  enabled: true
  # Power Rune settings
  power-rune:
    enabled: true
    cost: 1000.0
    display_name: "§6§lPower Rune"
    lore:
      - "§7Upgrades all enchantments on a tool"
      - "§7by 1 level (if not at maximum)"
      - ""
      - "§eApply at an anvil like an enchanted book"
    material: NETHER_STAR
    custom_model_data: 2001

  # Protection Rune settings
  protection-rune:
    enabled: true
    cost: 2000.0
    max-applications: 1
    display_name: "§b§lProtection Rune"
    lore:
      - "§7Prevents a tool from being destroyed"
      - "§7when it reaches zero durability"
      - "§7Instead, the tool will shatter"
      - ""
      - "§eApply at an anvil like an enchanted book"
    material: TOTEM_OF_UNDYING
    custom_model_data: 2002

  # General rune settings
  allow-stacking: false
  shatter-message: "§c§lSHATTERED - Apply another Protection Rune to protect again"
  protection-message: "§b§lProtection Rune Applied - This item is protected from breaking"

# Custom Enchantments
custom-enchantments:
  # Auto Smelting enchantment
  auto-smelting:
    enabled: true
    probability: 100.0  # Percentage chance to trigger (0-100)
    show-message: true
    experience-multiplier: 1.0

  # Backstab enchantment
  backstab:
    enabled: true
    show-message: true
    base-damage-bonus: 0.2  # 20% base bonus
    level-damage-bonus: 0.1  # 10% per level

  # Lucky Orb enchantment
  lucky-orb:
    enabled: true
    show-message: true
    base-exp-bonus: 0.5   # 50% base bonus
    level-exp-bonus: 0.25  # 25% per level

  # Tier selection buttons
  tier-buttons:
    tier1:
      material: "EMERALD"
      custom-model-data: 1001
      display-name: "§a§lTier I Enchanting"
      lore:
        - "§7Level Requirement: §e5+"
        - "§7Base Cost: §6$100"
        - "§7Basic enchantments"
        - ""
        - "§aClick to select!"
    tier2:
      material: "DIAMOND"
      custom-model-data: 1002
      display_name: "§b§lTier II Enchanting"
      lore:
        - "§7Level Requirement: §e15+"
        - "§7Base Cost: §6$250"
        - "§7Advanced enchantments"
        - ""
        - "§aClick to select!"
    tier3:
      material: "NETHERITE_INGOT"
      custom-model-data: 1003
      display_name: "§5§lTier III Enchanting"
      lore:
        - "§7Level Requirement: §e30+"
        - "§7Base Cost: §6$500"
        - "§7Legendary enchantments"
        - ""
        - "§aClick to select!"

  # Other GUI elements
  enchant-index-button:
    material: "BOOK"
    custom-model-data: 1010
    display_name: "§6§lEnchantment Index"
    lore:
      - "§7Browse all available enchantments"
      - "§7Learn about enchantment effects"
      - ""
      - "§eClick to open!"

  # Decoration items
  decoration:
    material: "GRAY_STAINED_GLASS_PANE"
    custom-model-data: 0
    display_name: " "

# Sound effects
sounds:
  enchant-success: "BLOCK_ENCHANTMENT_TABLE_USE"
  enchant-failure: "ENTITY_VILLAGER_NO"
  book-create: "ITEM_BOOK_PAGE_TURN"
  gui-click: "UI_BUTTON_CLICK"
  gui-open: "BLOCK_CHEST_OPEN"
  anvil-enchant: "BLOCK_ANVIL_USE"
  grindstone-disenchant: "BLOCK_GRINDSTONE_USE"

# Anvil settings
anvil:
  # Allow custom enchanted books in anvils
  allow-custom-books: true

  # Validate enchantment compatibility
  validate-compatibility: true

  # Show detailed error messages
  detailed-errors: true

# Specialized book settings
specialized-books:
  # Enable custom model data for textures
  enable-custom-textures: true

  # Starting custom model data value
  base-custom-model-data: 1000

  # Book types configuration
  enabled-types:
    - sword_book
    - axe_book
    - pickaxe_book
    - shovel_book
    - hoe_book
    - bow_book
    - crossbow_book
    - trident_book
    - helmet_book
    - chestplate_book
    - leggings_book
    - boots_book

# Messages
messages:
  prefix: "§6[SurealmsEnchant]§r "

  success:
    enchant-applied: "§aEnchantment applied successfully!"
    book-created: "§aEnchanted book created successfully!"
    book-received: "§aYou received a specialized book!"
    gui-opened: "§aOpening enchanting table...!"
    disenchant-success: "§aBook disenchanted successfully!"

  error:
    invalid-book: "§cYou can only place books or specialized books here!"
    invalid-item: "§cThis item cannot be enchanted!"
    no-book: "§cPlease place a book first!"
    book-already-enchanted: "§cThis book is already enchanted!"
    insufficient-money: "§cNot enough money! Need: %cost%"
    insufficient-level: "§cNot enough XP levels! Need: %level%!"
    incompatible-enchant: "§cThis enchantment is not compatible with this item!"
    conflicting-enchant: "§cThis enchantment conflicts with an existing enchantment!"
    already-enchanted: "§cThis item already has this enchantment!"
    player-only: "§cThis command can only be used by players!"
    invalid-args: "§cInvalid arguments! Use /enchant help for more information."
    no-permission: "§cYou don't have permission to use this command!"
    unknown-book-type: "§cUnknown book type: %type%"

  info:
    vault-not-found: "§eVault not found - money costs disabled"
    economy-disabled: "§eEconomy features are disabled"
    xp-gained: "§a+%amount% XP"

tome-of-renewal:
  material: "BOOK"
  custom-model-data: 1013
  display_name: "<!italic><#ffD700>Tome of Renewal"
  lore:
    - "<!italic><gray>Place this tome in the enchanting"
    - "<!italic><gray>table to reset your offered"
    - "<!italic><gray>enchantments for a new roll."
  success-message: "<green>Your enchantments have been renewed!</green>"

ashes:
  material: "GRAY_DYE"
  custom_model_data: 1014
  display_name: "<!italic><#A9A9A9>Ashes"
  lore:
    - "<!italic><gray>Place in an anvil with an"
    - "<!italic><gray>enchanted book to increase"
    - "<!italic><gray>the success chance by 5%."
  chance-modifier: 5.0

anvil-failure:
  enabled: true
  # Use 'namespace:key' format, for example: 'minecraft:cobblestone'
  new-item-model: "minecraft:cobblestone"
  prevent-usage: true
  usage-denied-message: "<red>This item is broken and cannot be used!"