# SurealmsEnchant Configuration File - Advanced Enchanting System
ashes-menu:
  sound:
    name: 'ENTITY_BLAZE_SHOOT'
    pitch: 1.3
    volume: 1
  input-slots: [0, 1, 2]
  title: "Ashes Conversion"
  convert-button:
    material: STICK
    name: TEST
    lore:
      - 'TEST'
    custom-model-data: 1
  output-slot: 15
  convert-slot: 13
  fill-item:
    material: "GRAY_STAINED_GLASS_PANE"
    custom-model-data: 0
gui_title_placeholders:
  tier1:
    has_enchants: "Yes"
    no_enchants: "No"
  tier2:
    has_enchants: "Yes"
    no_enchants: "No"
  tier3:
    has_enchants: "Yes"
    no_enchants: "No"

enchantment_option_unavailable:
  material: "BARRIER"
  custom_model_data: 0
  display_name: "§cUnavailable"
  lore:
    - "§cYou do not have enough"
    - "§cEXP or money for this."
    - ""
    - "§cCost: §6%cost%"
    - "§cRequired EXP: §e%exp%"

enchanting:
  success_rate_range:
    min: 50.0
    max: 90.0
  anvil-failure-chance-range:
    min: 5.0
    max: 25.0
  result_lore:
    success:
      enabled: true
      lines:
        - '<!italic><green>Enchantment successful!'
        - '<!italic><gray>Success rate: <white>{chance}%'
        - '<!italic><gray>Failure rate: <white>{anvil_chance}%'
    failure:
      enabled: true
      lines:
        - '<!italic><red>Enchantment failed!'
    destruction:
      enabled: true
      lines:
        - '<!italic><dark_red>Item has been destroyed!'
  gui-blacklist:
    - "my_custom_pack:super_jump"
    - "excellentenchants:auto_smelt"
  # Enable Vault economy integration
  enable-vault: true

  # Enable XP level requirements
  enable-xp-requirements: true

  # Tier configurations
  tier1:
    required-level: 5
    base-cost: 100.0

  tier2:
    required-level: 15
    base-cost: 250.0

  tier3:
    required-level: 30
    base-cost: 500.0
