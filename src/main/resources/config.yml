# Specialized book types and their properties
specialized_books:
  enabled: true
  types:
    - sword_book
    - axe_book
    - pickaxe_book
    - shovel_book
    - hoe_book
    - bow_book
    - crossbow_book
    - trident_book
    - helmet_book
    - chestplate_book
    - leggings_book
    - boots_book
enchanted-book-lore:
  show-applicable-items: true
  header: "<gray>Applicable to:"
  # {item} will be replaced with the item name
  item-format: "  <dark_gray>- <aqua>{item}"
  # {category} will be replaced with the category name (for vanilla enchants)
  category-format: "  <dark_gray>- <aqua>{category}"
  # Max items to show before showing "and ... more"
  limit: 8
  # {count} will be replaced with the remaining item count
  more-format: "  <dark_gray>- <gray>and {count} more..."
  # Item configuration for each book type
  items:
    sword_book:
      material: ENCHANTED_BOOK
      display_name: "&c&lSword Enchantment Book"
